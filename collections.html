<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Collections | ARCHÆM ÉLAN</title>
</head>
<body>

    <header class="site-header">
        <div class="header-top">
            <button class="menu-btn" onclick="history.back()">☰</button>
            <div class="logo-container">
                <img src="logo.svg" alt="LOGO">
            </div>
            <div style="width: 40px;"></div>
        </div>
    </header>

    <main>
        <div class="brand-statement">
            "Modern fashion inspired by structural elegance. <br> Minimal design meets luxury streetwear."
        </div>

        <div class="products">
            <div class="product">
                <img src="grey.jpg" alt="Charcoal Gray">
                <h3>Charcoal Gray</h3>
            </div>
            <div class="product">
                <img src="cream.jpg" alt="Cream">
                <h3>Cream</h3>
            </div>
            <div class="product">
                <img src="black.jpg" alt="Black">
                <h3>Black</h3>
            </div>
            <div class="product">
                <img src="old-heliotrope.jpg" alt="Old Heliotrope">
                <h3>Old Heliotrope</h3>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2026 ARCHÆM ÉLAN™</p>
    </footer>

</body>
</html>
