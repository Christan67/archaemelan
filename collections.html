<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLECTIONS | ARCHÆM ÉLAN™</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="header-top">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="logo-container"><img src="logo.svg" alt="LOGO"></div>
        </div>
    </header>

    <main>
        <h2 style="text-align: center; margin: 40px 0; letter-spacing: 5px; color: #3B0B2E;">SHIRT COLLECTION</h2>
        
        <section class="products">
            <div class="product">
                <img src="grey.jpg" alt="Gray">
                <h3>Charcoal Gray</h3>
            </div>
            <div class="product">
                <img src="cream.jpg" alt="Cream">
                <h3>Cream</h3>
            </div>
            <div class="product">
                <img src="black.jpg" alt="Black">
                <h3>Black</h3>
            </div>
            <div class="product">
                <img src="old-heliotrope.jpg" alt="Heliotrope">
                <h3>Old Heliotrope</h3>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 ARCHÆM ÉLAN™</p>
    </footer>
</body>
</html>
