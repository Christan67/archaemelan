<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHIVE | ARCHÆM ÉLAN</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="side-nav" id="sideNav">
        <a href="index.html">HOME</a>
        <a href="collections.html">COLLECTIONS</a>
        <a href="socials.html">SOCIAL MEDIAS</a>
    </nav>

    <header class="site-header">
        <div class="header-top">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="logo-container"><img src="logo.svg" alt="ARCHÆM ÉLAN LOGO"></div>
            <button class="cart-btn" onclick="location.href='cart.html'">🛒 <span id="cart-count">0</span></button>
        </div>
    </header>

    <main class="collections-container">
        <h2 class="section-title" style="margin: 40px 0; text-align:center; letter-spacing:5px;">THE ARCHIVE</h2>

        <p style="text-align:center; letter-spacing:3px; font-weight:bold; margin-bottom:20px; color:var(--eggplant);">SHIRTS</p>
        <div class="products-grid">
            <div class="product-card"><img src="grey.jpg"><h3>Charcoal Grey</h3></div>
            <div class="product-card"><img src="cream.jpg"><h3>Cream</h3></div>
            <div class="product-card"><img src="black.jpg"><h3>Black</h3></div>
            <div class="product-card"><img src="old-heliotrope.jpg"><h3>Old Heliotrope</h3></div>
        </div>

        <p style="text-align:center; letter-spacing:3px; font-weight:bold; margin: 40px 0 20px; color:var(--eggplant);">HOODIES</p>
        <div class="products-grid">
            <div class="product-card"><img src="wht hoodie.jpg"><h3>White Hoodie</h3></div>
            <div class="product-card"><img src="camou hoodie.jpg"><h3>Camou Hoodie</h3></div>
            <div class="product-card"><img src="blck hoodie.jpg"><h3>Black Hoodie</h3></div>
            <div class="product-card"><img src="cropped hoodie.jpg"><h3>Cropped Hoodie</h3></div>
        </div>
        </main>
    
    <footer class="site-footer"><p>© 2026 ARCHÆM ÉLAN™ • Modern Design</p></footer>

    <script>
        function toggleMenu() { document.getElementById('sideNav').classList.toggle('open'); }
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        window.onload = () => { document.getElementById('cart-count').innerText = cart.length; };
    </script>
</body>
</html>
