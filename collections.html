<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | ARCHÆM ÉLAN™</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="intro-overlay">
        <div class="intro-content">
            <h1>ARCHÆM ÉLAN</h1>
        </div>
    </div>

    <nav class="side-nav" id="sideNav">
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="collections.html">COLLECTIONS</a></li>
            <li><a href="socials.html">SOCIAL MEDIAS</a></li>
        </ul>
    </nav>

    <header class="site-header">
        <h1 class="brand">ARCHÆM ÉLAN™</h1>
        <button class="menu-btn" onclick="toggleMenu()" aria-label="Open Menu">☰</button>
    </header>

    <main>
    <section class="collection">
        <h2>Shirt Colors</h2>
        <div class="products">
            <div class="product">
                <h3>Charcoal Gray</h3>
                <img src="grey.jpg" alt="Gray Shirt">
            </div>
            <div class="product">
                <h3>Cream</h3>
                <img src="cream.jpg" alt="Cream Shirt">
            </div>
            <div class="product">
                <h3>Black</h3>
                <img src="black.jpg" alt="Black Shirt">
            </div>
            <div class="product">
                <h3>Old Heliotrope</h3>
                <img src="old-heliotrope.jpg" alt="Heliotrope Shirt">
            </div>
        </div>
    </section>
</main>

    <footer class="site-footer">
        <p>© 2026 ARCHÆM ÉLAN™ • Design Inspiration [cite: 17]</p>
    </footer>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('sideNav');
            const btn = document.querySelector('.menu-btn');
            nav.classList.toggle('open');
            btn.innerHTML = nav.classList.contains('open') ? '✕' : '☰';
        }
    </script>
</body>
</html>
