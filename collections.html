<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHIVE | ARCHÆM ÉLAN</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="intro-overlay"><h1 class="reveal-text" id="revealText">ARCHÆM ÉLAN</h1></div>

    <nav class="side-nav" id="sideNav">
        <a href="index.html">HOME</a>
        <a href="collections.html">COLLECTIONS</a>
        <a href="socials.html">SOCIAL MEDIAS</a>
    </nav>

    <header class="site-header">
        <div class="header-top">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="logo-container"><img src="logo.svg" alt="LOGO"></div>
            <button class="cart-btn" onclick="location.href='cart.html'">🛒 <span id="cart-count">0</span></button>
        </div>
    </header>

    <main class="collections-container">
        <h2 class="section-title" style="margin: 60px 0; letter-spacing:8px;">THE ARCHIVE</h2>

        <p style="text-align:center; font-weight:bold; margin-bottom:20px;">SHIRTS</p>
        <div class="products-grid">
            <div class="product-card" onclick="openModal('Charcoal Grey', 'grey.jpg', 'Heavyweight structural charcoal shirt.')"><img src="grey.jpg"><h3>Charcoal Grey</h3></div>
            <div class="product-card" onclick="openModal('Cream', 'cream.jpg', 'Minimalist alabaster cotton essential.')"><img src="cream.jpg"><h3>Cream</h3></div>
            <div class="product-card" onclick="openModal('Black', 'black.jpg', 'Reinforced midnight archive shirt.')"><img src="black.jpg"><h3>Black</h3></div>
            <div class="product-card" onclick="openModal('Old Heliotrope', 'old-heliotrope.jpg', 'Vintage tone with vanguard density.')"><img src="old-heliotrope.jpg"><h3>Old Heliotrope</h3></div>
        </div>

        <p style="text-align:center; font-weight:bold; margin: 40px 0 20px;">HOODIES</p>
        <div class="products-grid">
            <div class="product-card" onclick="openModal('White Hoodie', 'wht hoodie.jpg', 'Engineered double-fleece for crisp structure.')"><img src="wht hoodie.jpg"><h3>White Hoodie</h3></div>
            <div class="product-card" onclick="openModal('Camo Hoodie', 'camou hoodie.jpg', 'Urban tactical sequence with heavy ribbing.')"><img src="camou hoodie.jpg"><h3>Camo Hoodie</h3></div>
            <div class="product-card" onclick="openModal('Black Hoodie', 'blck hoodie.jpg', 'Signature tapered midnight fleece.')"><img src="blck hoodie.jpg"><h3>Black Hoodie</h3></div>
            <div class="product-card" onclick="openModal('Cropped Hoodie', 'cropped hoodie.jpg', 'Geometric peak of our hoodie archive.')"><img src="cropped hoodie.jpg"><h3>Cropped Hoodie</h3></div>
        </div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div class="modal-img"><img id="modalImg" src=""></div>
            <div class="modal-info">
                <h2 id="modalTitle" style="font-family: 'Playfair Display'; font-size: 2rem; margin-bottom:10px;"></h2>
                <p id="modalDesc" style="font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px;"></p>
                
                <label style="font-size: 0.7rem; letter-spacing: 2px;">SIZE</label>
                <div class="size-selector">
                    <select id="sizeSelect">
                        <option>SMALL</option><option>MEDIUM</option><option>LARGE</option><option>XL</option>
                    </select>
                </div>

                <label style="font-size: 0.7rem; letter-spacing: 2px;">QUANTITY</label>
                <div class="qty-container">
                    <button class="qty-btn" onclick="updateQty(-1)">-</button>
                    <span id="qty-value">1</span>
                    <button class="qty-btn" onclick="updateQty(1)">+</button>
                </div>

                <div class="modal-actions">
                    <button class="buy-now-btn" onclick="directBuy()">BUY IT NOW</button>
                    <button class="add-cart-btn" onclick="addToCart()">ADD TO CART</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer"><p>© 2026 ARCHÆM ÉLAN™ • Modern Design</p></footer>

    <script>
        function toggleMenu() { document.getElementById('sideNav').classList.toggle('open'); }
        
        // --- LOADING TRANSITION LOGIC ---
        const textWrapper = document.getElementById('revealText');
        const content = "ARCHÆM ÉLAN";
        textWrapper.innerHTML = content.split('').map((char, i) => `<span style="animation-delay: ${i * 0.1}s">${char === ' ' ? '&nbsp;' : char}</span>`).join('');
        
        window.onload = () => {
            document.getElementById('cart-count').innerText = (JSON.parse(localStorage.getItem('cart')) || []).length;
            setTimeout(() => {
                document.getElementById('intro-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('intro-overlay').remove(), 1000);
            }, 2500);
        };

        // --- SHOPPING LOGIC ---
        let currentQty = 1;
        let selectedProduct = {};

        function openModal(title, img, desc) {
            selectedProduct = { title, img };
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc;
            currentQty = 1;
            document.getElementById('qty-value').innerText = currentQty;
            document.getElementById('productModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }

        function updateQty(val) {
            currentQty = Math.max(1, currentQty + val);
            document.getElementById('qty-value').innerText = currentQty;
        }

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const item = { ...selectedProduct, size: document.getElementById('sizeSelect').value, qty: currentQty };
            cart.push(item);
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            alert("Added to cart!");
            closeModal();
        }

        function directBuy() {
            alert("Redirecting to secure checkout for: " + selectedProduct.title);
            // In a real site, this would redirect to checkout.php or Stripe
        }
    </script>
</body>
</html>
