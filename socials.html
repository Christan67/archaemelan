<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCHÆM ÉLAN™ | Socials</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-top">
        <button class="menu-btn" id="open-menu">☰ MENU</button>
        <nav class="site-nav" id="side-menu">
          <button class="close-menu" id="close-menu">&times;</button>
          <p class="menu-section-title">Primary</p>
          <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="collections.html">COLLECTIONS</a></li>
          </ul>
          <p class="menu-section-title">Contact</p>
          <ul>
            <li><a href="socials.html">EMAIL US</a></li>
          </ul>
        </nav>
      </div>
      <h1 class="brand">CONNECT WITH US</h1>
    </header>

    <main>
      <section class="social-section">
        <h2>Follow ARCHÆM ÉLAN™</h2>
        <p>Instagram: <a href="https://instagram.com/archaem_elan" target="_blank">@archaem_elan</a></p>
        <p>TikTok: <a href="https://tiktok.com/@archaem.elan" target="_blank">@archaem.elan</a></p>
      </section>

      <section class="contact-section">
        <h2>Contact Us</h2>
        <form action="#">
          <label for="name">Name:</label>
          <input type="text" id="name" required>
          <label for="email">Email:</label>
          <input type="email" id="email" required>
          <label for="message">Message:</label>
          <textarea id="message" rows="4" required></textarea>
          <button type="submit" class="btn">Send Message</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 ARCHÆM ÉLAN™</p>
    </footer>
  </div>

  <script>
    document.getElementById('open-menu').onclick = () => document.getElementById('side-menu').classList.add('active');
    document.getElementById('close-menu').onclick = () => document.getElementById('side-menu').classList.remove('active');
  </script>
</body>
</html>
