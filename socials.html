<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socials | ARCHÆM ÉLAN™</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="intro-overlay">
        <div class="intro-content">
            <h1>ARCHÆM ÉLAN</h1>
        </div>
    </div>

    <nav class="side-nav" id="sideNav">
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="collections.html">COLLECTIONS</a></li>
            <li><a href="socials.html">SOCIAL MEDIAS</a></li>
        </ul>
    </nav>

    <header class="site-header">
        <h1 class="brand">ARCHÆM ÉLAN™</h1>
        <button class="menu-btn" onclick="toggleMenu()" aria-label="Open Menu">☰</button>
    </header>

    <main>
        <section class="social-section" style="text-align:center;">
            <h2>CONNECT WITH US</h2>
            <p>Join our community of young architects and designers[cite: 11].</p>
            <p>Instagram: <a href="#" style="color:var(--eggplant); font-weight:bold;">@archaem_elan</a></p>
            <p>TikTok: <a href="#" style="color:var(--eggplant); font-weight:bold;">@archaem.elan</a></p>
        </section>

        <section class="contact-section">
            <h2>INQUIRIES</h2>
            <form action="#">
                <label for="name">Name:</label>
                <input type="text" id="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <label for="message">Message:</label>
                <textarea id="message" rows="4" required></textarea>
                <button type="submit" class="btn">SEND MESSAGE</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 ARCHÆM ÉLAN™ • Professional Excellence </p>
    </footer>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('sideNav');
            const btn = document.querySelector('.menu-btn');
            nav.classList.toggle('open');
            btn.innerHTML = nav.classList.contains('open') ? '✕' : '☰';
        }
    </script>
</body>
</html>
